{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Inscription page</title>
    <link rel="stylesheet" href="/static/css/fontawesome-free-6.1.1-web/css/all.css">
    <link rel="stylesheet" href="/static/css/InscriptionPages/MainLoginPages.css">
    <style>
        .SignUpFormulaire label p {
            display: flex;
            align-items: baseline;
        }
        .SignUpFormulaire label p strong {
            margin-left: 25px;
        }
    </style>
</head>
<body>
    <section>
        
        <div class="MainDiv">
            <div class="LoginTransition">
                <div class="CenterCountainers">
                    <p>J'ai dejas un compte</p>
                    <button class="LoginButton">Connexion</button>
                </div>
                <button class="BackToMenu"><i class="fa fa-home"></i></button>
            </div>
            <form data-url="{% url "GodUser" %}" method="post" id="GodForm">
                {% csrf_token %}
                <div class="SignUpFormulaire">
                    <div class="inconito"></div>
                    <p class="InscriptionLogo">Inscription</p>
                    <label>
                        <p>Nom 
                            <strong id='Nom_Input'style="color: red; font-size: 12px;display:none;"> </strong></p>
                        <input type="text" name="Nom_Input" >
                    </label>
                    <label>
                        <p>Prenom <strong id='Prenom_Input'style="color: red; font-size: 12px;display:none;"> </strong></p>
                        <input type="text" name="Prenom_Input" >
                        
                    </label>
                    <label>
                        <p>Sexe <strong id='Sexe'style="color: red; font-size: 12px;display:none;"> </strong></p>
                        <div class="SexeCountainers">
                            <div>
                                <p>Homme</p>
                                <input type="checkbox" value="Homme" name="Homme">
                            </div>
                            <div>
                                <p>Femme</p>
                                <input type="checkbox" value="Femme" name="Femme">
                            </div>
                            <div>
                                <p>Autre</p>
                                <input type="checkbox" value="Autre" name="Autre">
                            </div>
                        </div>
                    </label>
                    <label>
                        <p>Email <strong id='Email_Input'style="color: red; font-size: 12px;display:none;"> </strong></p>
                        <input type="text" placeholder="Exemple@gmail.com" name="Email_Input">
                    </label>
                    <label>
                        <p>Mot de passe   <strong id='Mot_de_Passe_Input'style="color: red; font-size: 12px;display:none;"></strong></p>
                        <input type="text" name="Mot_de_Passe_Input" >
                    </label>
                    <label>
                        <p>Confirmation  <strong id='Confirmation_Input'style="color: red; font-size: 12px;display:none;"></strong></p>
                        <input type="text" name="Confirmation_Input" >
                    </label>
                    <div class="ButtonCountainers"><button >Creer</button></div>
                </div>
            </form>
        </div>
    </section>
    <script src="{% static "js/Enregistrement/Login.js" %}?v=2"></script>
</body>
</html>
